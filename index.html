<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Time</title>
    <style>
        :root {
            --bg-1: #08111d;
            --bg-2: #12233a;
            --panel: rgba(8, 17, 29, 0.78);
            --panel-soft: rgba(255, 255, 255, 0.07);
            --border: rgba(148, 163, 184, 0.18);
            --text: #f8fafc;
            --muted: #c8d3e1;
            --subtle: #93a4b8;
            --accent: #f97316;
            --accent-2: #14b8a6;
            --accent-3: #60a5fa;
            --success: #10b981;
            --danger: #fb7185;
            --shadow: 0 24px 64px rgba(2, 8, 23, 0.32);
        }
        body.light {
            --bg-1: #f5f8ff;
            --bg-2: #dde8fb;
            --panel: rgba(255, 255, 255, 0.86);
            --panel-soft: rgba(15, 23, 42, 0.04);
            --border: rgba(71, 85, 105, 0.16);
            --text: #122238;
            --muted: #42546d;
            --subtle: #6b7d93;
            --shadow: 0 20px 52px rgba(15, 23, 42, 0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.16), transparent 24%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
            transition: background 0.25s ease, color 0.25s ease;
        }
        body.dark { color-scheme: dark; }
        body.light { color-scheme: light; }
        button, input, select { font: inherit; }
        .shell { width: min(1440px, calc(100% - 24px)); margin: 0 auto; padding: 16px 0 28px; }
        .glass { background: var(--panel); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); backdrop-filter: blur(18px); }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 20px; }
        .brand { font-size: clamp(28px, 4vw, 40px); font-weight: 800; letter-spacing: -0.04em; }
        .brand span { color: var(--accent); }
        .tagline, .muted, .subtle, .panel p, label { color: var(--muted); }
        .subtle { color: var(--subtle); }
        .row, .toolbar, .tabs, .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .tabs { margin: 14px 0; }
        input, select, button { min-height: 46px; border-radius: 14px; border: 1px solid var(--border); }
        input, select {
            padding: 10px 14px;
            background: rgba(8, 17, 29, 0.92);
            color: var(--text);
            -webkit-text-fill-color: var(--text);
            caret-color: var(--text);
            opacity: 1;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        body.light input, body.light select {
            background: rgba(255, 255, 255, 0.94);
            color: var(--text);
            -webkit-text-fill-color: var(--text);
            caret-color: var(--text);
        }
        input::placeholder {
            color: var(--subtle);
            -webkit-text-fill-color: var(--subtle);
        }
        input:focus, select:focus {
            outline: 2px solid rgba(96, 165, 250, 0.45);
            outline-offset: 2px;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
        }
        select option {
            background: #0f172a;
            color: #f8fafc;
        }
        body.light select option {
            background: #ffffff;
            color: #122238;
        }
        button { padding: 10px 16px; cursor: pointer; transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease; }
        button:hover { transform: translateY(-1px); }
        button:focus-visible {
            outline: 2px solid rgba(96, 165, 250, 0.55);
            outline-offset: 2px;
        }
        .tab, .secondary {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text);
        }
        body.light .tab, body.light .secondary {
            background: rgba(255, 255, 255, 0.9);
        }
        .tab.active, .primary {
            background: linear-gradient(135deg, var(--accent-3), var(--accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 12px 30px rgba(96, 165, 250, 0.18);
        }
        .success { background: linear-gradient(135deg, var(--accent-2), var(--success)); color: white; border-color: transparent; }
        .page { min-height: 560px; padding: 20px; display: none; animation: fadeIn 0.22s ease; }
        .page.active { display: block; }
        .hero, .two-col { display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 16px; }
        .stack { display: grid; gap: 12px; }
        .panel { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 20px; padding: 18px; }
        .eyebrow, .section-title { text-transform: uppercase; letter-spacing: 0.16em; color: var(--accent-2); font-size: 12px; font-weight: 800; }
        .time, .big-number, .mini-time, .prayer-clock, .stat-strong { font-weight: 800; letter-spacing: -0.04em; }
        .time, .big-number { font-size: clamp(48px, 9vw, 92px); margin: 12px 0; font-variant-numeric: tabular-nums; }
        .hijri-line { color: var(--accent-2); font-weight: 700; margin-top: 8px; }
        .cards-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-top: 16px; }
        .mini-time, .prayer-clock, .stat-strong { font-size: 28px; }
        .weather-hero { display: flex; justify-content: center; align-items: center; gap: 18px; text-align: center; flex-wrap: wrap; margin-top: 18px; }
        .weather-icon { font-size: 52px; }
        .weather-temp { font-size: clamp(44px, 8vw, 80px); font-weight: 800; }
        .center { justify-content: center; }
        .prayer-card, .alarm-card, .lap-card { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px; border-radius: 18px; background: var(--panel-soft); border: 1px solid var(--border); }
        .prayer-card.current { border-color: rgba(20, 184, 166, 0.5); box-shadow: 0 14px 30px rgba(20, 184, 166, 0.14); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; margin-top: 16px; }
        .calendar-cell { min-height: 72px; border-radius: 16px; background: var(--panel-soft); padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid transparent; }
        .calendar-cell.header, .calendar-cell.empty { min-height: unset; background: transparent; justify-content: center; align-items: center; }
        .calendar-cell.today { background: linear-gradient(135deg, var(--accent-3), #4f46e5); color: white; }
        .calendar-cell.hijri-today { background: linear-gradient(135deg, var(--accent-2), var(--success)); color: white; }
        .calendar-cell small { opacity: 0.82; }
        .notifications { position: fixed; top: 16px; right: 16px; width: min(360px, calc(100vw - 32px)); display: grid; gap: 10px; z-index: 1000; }
        .notice { padding: 14px 16px; border-radius: 16px; background: rgba(10, 18, 31, 0.94); color: #f8fafc; border-left: 4px solid var(--accent-3); box-shadow: var(--shadow); }
        .notice.success { border-left-color: var(--success); }
        .notice.error { border-left-color: var(--danger); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 960px) { .hero, .two-col { grid-template-columns: 1fr; } }
        @media (max-width: 720px) {
            .topbar { align-items: flex-start; }
            .tabs { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
            .tab { white-space: nowrap; }
            .calendar-cell { min-height: 58px; }
            .prayer-card, .alarm-card, .lap-card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body class="dark">
    <div class="notifications" id="notifications"></div>
    <div class="shell">
        <header class="topbar glass">
            <div>
                <div class="brand">Horizon <span>Time</span></div>
                <div class="tagline">A unified dashboard for time, weather, prayer times, Hijri calendar, stopwatch, timer, and alarms.</div>
            </div>
            <div class="toolbar">
                <select id="language"></select>
                <select id="timezone"></select>
                <button id="themeBtn" class="secondary" type="button">Light</button>
                <button id="exportBtn" class="secondary" type="button">Export</button>
            </div>
        </header>
        <nav class="tabs" id="tabs"></nav>
        <section class="page glass active" id="clockPage"><div id="clockContent"></div></section>
        <section class="page glass" id="weatherPage"><div id="weatherContent"></div></section>
        <section class="page glass" id="prayerPage"><div id="prayerContent"></div></section>
        <section class="page glass" id="calendarPage"><div id="calendarContent"></div></section>
        <section class="page glass" id="stopwatchPage"><div id="stopwatchContent"></div></section>
        <section class="page glass" id="timerPage"><div id="timerContent"></div></section>
        <section class="page glass" id="alarmsPage"><div id="alarmsContent"></div></section>
    </div>
    <script src="app.js"></script>
</body>
</html>
